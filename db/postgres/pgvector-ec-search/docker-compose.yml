services:
  db:
    image: pgvector/pgvector:pg17
    container_name: pgvector_ec_search_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgvector_ec_search
    ports:
      - "15432:5432"
    volumes:
      - pgvector_ec_search_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgvector_ec_search"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_ec_search_data:
